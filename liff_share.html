<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在啟動分享...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .loader { border: 5px solid #e0e0e0; border-top: 5px solid #00E2B1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { margin-top: 15px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div id="status">請稍候，正在開啟分享列表...</div>

    <script>
        async function main() {
            try {
                // 1. 初始化 LIFF
                await liff.init({ liffId: "2009494611-a6cUT7JK" });

                // 2. 登入檢查
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // 3. 呼叫分享功能
                if (liff.isApiAvailable('shareTargetPicker')) {
                    const result = await liff.shareTargetPicker([
                        {
                            "type": "flex",
                            "altText": "全球市場深度分析報告",
                            "contents": {
                                "type": "bubble",
                                "size": "mega",
                                "header": {
                                    "type": "box",
                                    "layout": "vertical",
                                    "backgroundColor": "#1a1a2e",
                                    "paddingAll": "20px",
                                    "contents": [
                                        {
                                            "type": "text",
                                            "text": "全球市場深度分析報告 🌍",
                                            "color": "#ffffff",
                                            "weight": "bold",
                                            "size": "xl",
                                            "align": "center"
                                        }
                                    ]
                                },
                                "body": {
                                    "type": "box",
                                    "layout": "vertical",
                                    "paddingAll": "15px",
                                    "spacing": "md",
                                    "contents": [
                                        {
                                            "type": "box",
                                            "layout": "horizontal",
                                            "spacing": "sm",
                                            "contents": [
                                                { "type": "text", "text": "📊", "size": "md", "flex": 0 },
                                                { "type": "text", "text": "主要指數概況 (2026-04-02)", "weight": "bold", "size": "md", "margin": "sm", "flex": 1 }
                                            ]
                                        },
                                        { "type": "separator", "margin": "sm" },
                                        { "type": "text", "text": "道瓊工業 (DIA)", "size": "sm", "color": "#888888", "margin": "md" },
                                        { "type": "text", "text": "465.48 (+0.49%)", "size": "xxl", "weight": "bold", "color": "#FF0000" },
                                        { "type": "text", "text": "標普500 (SPY)", "size": "sm", "color": "#888888", "margin": "md" },
                                        { "type": "text", "text": "655.24 (+0.75%)", "size": "xxl", "weight": "bold", "color": "#FF0000" },
                                        { "type": "text", "text": "納斯達克100 (QQQ)", "size": "sm", "color": "#888888", "margin": "md" },
                                        { "type": "text", "text": "584.31 (+1.24%)", "size": "xxl", "weight": "bold", "color": "#FF0000" },
                                        { "type": "separator", "margin": "lg" },
                                        {
                                            "type": "box",
                                            "layout": "horizontal",
                                            "spacing": "sm",
                                            "margin": "md",
                                            "contents": [
                                                { "type": "text", "text": "🚀", "size": "md", "flex": 0 },
                                                { "type": "text", "text": "熱門科技股監測", "weight": "bold", "size": "md", "margin": "sm", "flex": 1 }
                                            ]
                                        },
                                        { "type": "separator", "margin": "sm" },
                                        {
                                            "type": "box",
                                            "layout": "horizontal",
                                            "margin": "md",
                                            "contents": [
                                                { "type": "text", "text": "AAPL 蘋果", "size": "sm", "flex": 1, "color": "#333333" },
                                                { "type": "text", "text": "255.63 (+0.73%)", "size": "sm", "color": "#FF0000", "align": "end", "flex": 1 }
                                            ]
                                        },
                                        {
                                            "type": "box",
                                            "layout": "horizontal",
                                            "margin": "sm",
                                            "contents": [
                                                { "type": "text", "text": "NVDA 輝達", "size": "sm", "flex": 1, "color": "#333333" },
                                                { "type": "text", "text": "175.75 (+0.75%)", "size": "sm", "color": "#FF0000", "align": "end", "flex": 1 }
                                            ]
                                        },
                                        {
                                            "type": "box",
                                            "layout": "horizontal",
                                            "margin": "sm",
                                            "contents": [
                                                { "type": "text", "text": "TSLA 特斯拉", "size": "sm", "flex": 1, "color": "#333333" },
                                                { "type": "text", "text": "381.26 (+2.56%)", "size": "sm", "color": "#FF0000", "align": "end", "flex": 1 }
                                            ]
                                        }
                                    ]
                                }
                            }
                        }
                    ]);

                    if (result) {
                        document.getElementById('status').innerText = "發送成功！";
                    } else {
                        document.getElementById('status').innerText = "已取消分享。";
                    }
                } else {
                    document.getElementById('status').innerText = "不支援分享 API。";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "系統錯誤，請重試。";
            } finally {
                // 發送完畢或錯誤後，稍作停留再關閉
                setTimeout(() => liff.closeWindow(), 2000);
            }
        }

        window.onload = main;
    </script>
</body>
</html>
