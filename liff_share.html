<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在啟動分享...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .loader {
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid #00E2B1;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #status {
            margin-top: 20px;
            font-size: 16px;
            text-align: center;
            padding: 0 30px;
            line-height: 1.6;
        }
        .gist-id {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 10px;
            font-family: monospace;
        }
        .error {
            color: #ff6b6b;
            font-weight: bold;
        }
        .success {
            color: #51cf66;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader" id="loader"></div>
        <div id="status">正在載入市場報告...</div>
        <div id="gist-info" class="gist-id"></div>
    </div>

    <script>
        async function main() {
            const statusElement = document.getElementById('status');
            const gistInfoElement = document.getElementById('gist-info');
            const loaderElement = document.getElementById('loader');

            try {
                // 1. 從 URL 獲取 gist_id
                const urlParams = new URLSearchParams(window.location.search);
                const gistId = urlParams.get('gist_id');

                if (!gistId) {
                    loaderElement.style.display = 'none';
                    statusElement.innerHTML = '<span class="error">❌ 錯誤：缺少 gist_id 參數</span>';
                    gistInfoElement.textContent = '請通過正確的分享連結打開此頁面';
                    setTimeout(() => {
                        try { liff.closeWindow(); } catch(e) {}
                    }, 3000);
                    return;
                }

                gistInfoElement.textContent = `Gist ID: ${gistId.substring(0, 12)}...`;
                statusElement.textContent = '正在從 GitHub Gist 載入報告...';

                // 2. 從 GitHub Gist 獲取 JSON
                const gistUrl = `https://api.github.com/gists/${gistId}`;
                const gistResponse = await fetch(gistUrl);

                if (!gistResponse.ok) {
                    loaderElement.style.display = 'none';
                    statusElement.innerHTML = `<span class="error">❌ 無法載入報告</span>`;
                    gistInfoElement.textContent = `HTTP 錯誤: ${gistResponse.status} ${gistResponse.statusText}`;
                    setTimeout(() => {
                        try { liff.closeWindow(); } catch(e) {}
                    }, 3000);
                    return;
                }

                const gistData = await gistResponse.json();

                // 3. 檢查檔案是否存在
                if (!gistData.files || !gistData.files['market_report.json']) {
                    loaderElement.style.display = 'none';
                    statusElement.innerHTML = '<span class="error">❌ Gist 中找不到報告檔案</span>';
                    gistInfoElement.textContent = '檔案名稱應為: market_report.json';
                    setTimeout(() => {
                        try { liff.closeWindow(); } catch(e) {}
                    }, 3000);
                    return;
                }

                // 4. 解析 Flex Message JSON
                const flexJson = JSON.parse(
                    gistData.files['market_report.json'].content
                );

                statusElement.textContent = '報告載入成功！正在啟動 LIFF...';
                gistInfoElement.textContent = `建立時間: ${new Date(gistData.created_at).toLocaleString('zh-TW')}`;

                // 5. 初始化 LIFF
                await liff.init({ liffId: "2009494611-a6cUT7JK" });

                // 6. 登入檢查
                if (!liff.isLoggedIn()) {
                    statusElement.textContent = '正在導向登入頁面...';
                    liff.login();
                    return;
                }

                statusElement.textContent = '正在開啟分享選單...';

                // 7. 檢查是否支援分享功能
                if (!liff.isApiAvailable('shareTargetPicker')) {
                    loaderElement.style.display = 'none';
                    statusElement.innerHTML = '<span class="error">❌ 此裝置不支援分享功能</span>';
                    gistInfoElement.textContent = '請在 LINE 應用程式中打開';
                    setTimeout(() => {
                        try { liff.closeWindow(); } catch(e) {}
                    }, 3000);
                    return;
                }

                // 8. 呼叫分享功能
                const result = await liff.shareTargetPicker([
                    {
                        "type": "flex",
                        "altText": "📊 全球市場深度分析報告",
                        "contents": flexJson
                    }
                ]);

                loaderElement.style.display = 'none';

                if (result) {
                    statusElement.innerHTML = '<span class="success">✅ 分享成功！</span>';
                    gistInfoElement.textContent = '訊息已發送到選定的對話';
                } else {
                    statusElement.textContent = '已取消分享';
                    gistInfoElement.textContent = '您已取消選擇分享對象';
                }

            } catch (error) {
                console.error("錯誤詳情:", error);
                loaderElement.style.display = 'none';
                statusElement.innerHTML = `<span class="error">❌ 系統錯誤</span>`;
                gistInfoElement.textContent = error.message || '未知錯誤';
            } finally {
                // 2 秒後關閉視窗
                setTimeout(() => {
                    try {
                        liff.closeWindow();
                    } catch (e) {
                        statusElement.innerHTML += '<br><br><small>請手動關閉此視窗</small>';
                    }
                }, 2000);
            }
        }

        // 頁面載入後執行
        window.onload = main;
    </script>
</body>
</html>
