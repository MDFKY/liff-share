<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在啟動分享...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .loader { border: 5px solid #e0e0e0; border-top: 5px solid #00E2B1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { margin-top: 15px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div id="status">請稍候，正在開啟分享列表...</div>

    <script>
        async function main() {
            try {
                // 1. 初始化 LIFF (使用您的 ID)
                await liff.init({ liffId: "2009494611-a6cUT7JK" });

                // 2. 登入檢查
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // 3. 呼叫分享功能
                if (liff.isApiAvailable('shareTargetPicker')) {
                    const result = await liff.shareTargetPicker([
                        {
                            "type": "flex",
                            "altText": "這是一份很重要的分析報告，分享給你！",
                            "contents": {
                                "type": "bubble",
                                "hero": {
                                    "type": "image",
                                    "url": "https://your-image-url.com/report_cover.jpg",
                                    "size": "full", "aspectRatio": "20:13", "aspectMode": "cover"
                                },
                                "body": {
                                    "type": "box", "layout": "vertical",
                                    "contents": [
                                        { "type": "text", "text": "【清明連假全面分析】", "weight": "bold", "size": "xl" },
                                        { "type": "text", "text": "中東戰事衝擊千點行情", "color": "#ff4500", "margin": "sm" }
                                    ]
                                },
                                "footer": {
                                    "type": "box", "layout": "vertical",
                                    "contents": [{
                                        "type": "button", "style": "primary", "color": "#00E2B1",
                                        "action": { "type": "uri", "label": "點我查看詳情", "uri": "https://www.fubon.com/futures/" }
                                    }]
                                }
                            }
                        }
                    ]);

                    if (result) {
                        document.getElementById('status').innerText = "發送成功！";
                    } else {
                        document.getElementById('status').innerText = "已取消分享。";
                    }
                } else {
                    document.getElementById('status').innerText = "不支援分享 API。";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "系統錯誤，請重試。";
            } finally {
                // 1.5 秒後自動關閉頁面
                setTimeout(() => liff.closeWindow(), 1500);
            }
        }

        window.onload = main;
    </script>
</body>
</html>
