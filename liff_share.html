<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        async function share() {
            await liff.init({ liffId: "你的LIFF_ID" });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            // 這裡定義點擊分享後，朋友會看到的內容
            await liff.shareTargetPicker([{
                "type": "flex",
                "altText": "這是一份很重要的報告，分享給你！",
                "contents": {
                    "type": "bubble",
                    "hero": {
                        "type": "image",
                        "url": "https://你的圖片連結.jpg", // 報告的主圖
                        "size": "full", "aspectRatio": "20:13", "aspectMode": "cover"
                    },
                    "body": {
                        "type": "box", "layout": "vertical",
                        "contents": [
                            { "type": "text", "text": "【清明連假全面分析】", "weight": "bold", "size": "xl" },
                            { "type": "text", "text": "中東戰事衝擊千點行情", "color": "#ff4500" }
                        ]
                    },
                    "footer": {
                        "type": "box", "layout": "vertical",
                        "contents": [{
                            "type": "button", "style": "primary", "color": "#00b900",
                            "action": { "type": "uri", "label": "點我進入官網", "uri": "https://your-official-site.com" }
                        }]
                    }
                }
            }]);
            liff.closeWindow(); // 分享完畢自動關閉
        }
        window.onload = share;
    </script>
</head>
<body></body>
</html>
