<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享功能調試</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background-color: #f4f4f4;
      font-size: 12px;
    }
    .debug-info {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
      border-left: 4px solid #00E2B1;
    }
    .error {
      border-left-color: #c62828;
      color: #c62828;
    }
    .success {
      border-left-color: #27ae60;
      color: #27ae60;
    }
    h3 {
      margin: 5px 0;
      color: #333;
    }
    pre {
      overflow-x: auto;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 3px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>🔍 LIFF 分享功能調試</h1>
  <div id="debug-output"></div>

  <script>
    const debugOutput = document.getElementById('debug-output');

    function addDebugInfo(title, content, type = 'info') {
      const div = document.createElement('div');
      div.className = `debug-info ${type}`;
      div.innerHTML = `<h3>${title}</h3><pre>${content}</pre>`;
      debugOutput.appendChild(div);
      console.log(`[${title}]`, content);
    }

    async function main() {
      try {
        // 1. 顯示完整 URL
        addDebugInfo('📍 完整 URL', window.location.href);
        addDebugInfo('🔗 URL 長度', window.location.href.length + ' 字元');

        // 2. 解析 URL 參數
        const urlParams = new URLSearchParams(window.location.search);
        addDebugInfo('📦 URL 參數', JSON.stringify(Object.fromEntries(urlParams), null, 2));

        const flexData = urlParams.get('flex');

        if (!flexData) {
          addDebugInfo('❌ 錯誤', '沒有找到 flex 參數！', 'error');
          addDebugInfo('💡 提示', '可能的原因：\n1. URL 被截斷\n2. 參數在 LIFF 重定向中丟失\n3. 分享按鈕 URI 不正確', 'error');
          return;
        }

        addDebugInfo('✅ flex 參數存在', `長度: ${flexData.length} 字元`, 'success');
        addDebugInfo('🔤 flex 參數（前 200 字元）', flexData.substring(0, 200) + '...');
        addDebugInfo('🔤 flex 參數（後 100 字元）', '...' + flexData.substring(flexData.length - 100));

        // 3. 嘗試解碼
        try {
          let base64Data = flexData.replace(/-/g, '+').replace(/_/g, '/');

          while (base64Data.length % 4) {
            base64Data += '=';
          }

          addDebugInfo('📝 Base64（補齊後）', `長度: ${base64Data.length} 字元`);

          const decodedData = atob(base64Data);
          addDebugInfo('✅ Base64 解碼成功', `解碼後長度: ${decodedData.length} 字元`, 'success');

          const flexMessage = JSON.parse(decodedData);
          addDebugInfo('✅ JSON 解析成功', JSON.stringify(flexMessage, null, 2).substring(0, 500) + '\n...', 'success');

          // 4. 初始化 LIFF
          await liff.init({ liffId: "2009494611-a6cUT7JK" });
          addDebugInfo('✅ LIFF 初始化成功', 'LIFF ID: 2009494611-a6cUT7JK', 'success');

          // 5. 檢查 API 可用性
          if (!liff.isApiAvailable('shareTargetPicker')) {
            addDebugInfo('❌ API 不可用', 'shareTargetPicker API 不可用', 'error');
            return;
          }
          addDebugInfo('✅ API 可用', 'shareTargetPicker 可用', 'success');

          // 6. 移除分享按鈕
          const shareMessage = JSON.parse(JSON.stringify(flexMessage));
          if (shareMessage.footer && shareMessage.footer.contents) {
            const originalCount = shareMessage.footer.contents.length;
            shareMessage.footer.contents = shareMessage.footer.contents.filter(item => {
              if (item.type === 'button' && item.action && item.action.type === 'uri') {
                const label = item.action.label || '';
                return !label.includes('分享');
              }
              return true;
            });
            const newCount = shareMessage.footer.contents.length;
            addDebugInfo('🗑️ 移除分享按鈕', `原始: ${originalCount} 個按鈕 → 移除後: ${newCount} 個按鈕`);
          }

          // 7. 開啟分享選擇器
          addDebugInfo('📤 準備開啟分享選擇器', '3 秒後自動開啟...');

          setTimeout(async () => {
            try {
              const result = await liff.shareTargetPicker([
                {
                  "type": "flex",
                  "altText": "📊 全球市場深度分析報告",
                  "contents": shareMessage
                }
              ]);

              if (result) {
                addDebugInfo('✅ 分享成功', '訊息已發送', 'success');
              } else {
                addDebugInfo('ℹ️ 已取消', '用戶取消分享');
              }

              setTimeout(() => liff.closeWindow(), 1500);
            } catch (error) {
              addDebugInfo('❌ 分享失敗', error.message, 'error');
            }
          }, 3000);

        } catch (e) {
          addDebugInfo('❌ 解碼失敗', e.message + '\n' + e.stack, 'error');
        }

      } catch (error) {
        addDebugInfo('❌ 嚴重錯誤', error.message + '\n' + error.stack, 'error');
      }
    }

    window.onload = main;
  </script>
</body>
</html>
